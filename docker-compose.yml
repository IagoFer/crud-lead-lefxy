services:
  mongodb:
    image: mongo:latest
    container_name: lefxy-mongo
    ports:
      - "27017:27017"
    volumes:
      - lefxy_mongo_data:/data/db
    networks:
      - lefxy-net

  redis:
    image: redis:alpine
    container_name: lefxy-redis
    ports:
      - "6379:6379"
    volumes:
      - lefxy_redis_data:/data
    networks:
      - lefxy-net

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: lefxy-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/lefxy
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./back-end/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - lefxy-net
    volumes:
      - ./back-end/logs:/app/logs

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: lefxy-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - lefxy-net

volumes:
  lefxy_mongo_data:
  lefxy_redis_data:

networks:
  lefxy-net:
